# Backend server stack — runs on the Hetzner box.
# The box PULLS the prebuilt image (built+pushed by CI); it never compiles.
# Storage is on-disk: audio clips + SQLite metadata live on the `clipdata` volume.
# No MinIO, no Postgres. Frontend deploys separately.
#
# One-time on the box:
#   mkdir -p ~/voicemix && cd ~/voicemix
#   cp .env.example .env   # fill in real secrets once (CI ships .env.example, leaves .env)
#   docker login ghcr.io   # CI also logs in during deploy

services:
  backend:
    image: ghcr.io/aaronw122/voicemix-backend:${BACKEND_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    volumes:
      - clipdata:/data            # MP3 clips + SQLite db (DATA_DIR=/data)
    ports:
      - "127.0.0.1:8000:8000"     # local-only: health checks + SSH-tunnel debugging

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config

volumes:
  clipdata:
  caddydata:
  caddyconfig:
