# Backend server stack — runs on the Hetzner box.
# The box PULLS prebuilt images (built+pushed by CI); it never compiles.
# Frontend is deployed separately (its own repo/pipeline).
#
# One-time on the box:
#   1. mkdir -p ~/voicemix && cd ~/voicemix
#   2. cp .env.example .env  (CI ships .env.example; you fill in real secrets once)
#   3. docker login ghcr.io   (or make the GHCR package public)

services:
  backend:
    image: ghcr.io/aaronw122/voicemix-backend:latest
    restart: unless-stopped
    env_file: .env
    depends_on:
      - postgres
      - minio
    expose:
      - "8000"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    # 9001 = web console (lock down / remove once you have a real domain).
    # The S3 API (9000) is fronted by Caddy at {$STORAGE_DOMAIN} so clients
    # can fetch presigned URLs over HTTPS — see Caddyfile.
    ports:
      - "9001:9001"
    expose:
      - "9000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - minio
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}
      STORAGE_DOMAIN: ${STORAGE_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config

volumes:
  pgdata:
  miniodata:
  caddydata:
  caddyconfig:
