<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>voiceMix</title>
  <style>
    * { box-sizing: border-box; }
    html, body, #root { height: 100%; }
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }
    /* hide carousel scrollbar */
    .persona-scroller { scrollbar-width: none; -ms-overflow-style: none; }
    .persona-scroller::-webkit-scrollbar { display: none; }

    @keyframes vpulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
    @keyframes vspin { to { transform: rotate(360deg); } }
    @keyframes vtoast-in { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }

    .app-bg { min-height: 100%; background: #000; display: flex; align-items: center; justify-content: center; }
    .frame {
      position: relative;
      width: min(100vw, 420px);
      height: 100dvh;
      background: linear-gradient(180deg, #161619 0%, #0c0c0e 60%);
      display: flex; flex-direction: column; overflow: hidden;
    }
    @media (min-width: 480px) {
      .frame {
        height: min(92vh, 880px);
        border-radius: 32px;
        box-shadow: 0 30px 90px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.08);
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
