<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>voiceMix</title>
  <style>
    :root { --accent: #e0245e; --bg: #111; --card: #1d1d1d; --line: #3a3a3a; --text: #eee; --dim: #999; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text);
           margin: 0; min-height: 100vh; display: grid; place-items: center; }
    main { text-align: center; padding: 2rem 1rem; width: min(94vw, 30rem); }
    h1 { font-size: 0.9rem; letter-spacing: 0.35em; color: var(--dim); font-weight: 600; margin: 0 0 2rem; }

    #record-btn { width: 6.5rem; height: 6.5rem; border-radius: 50%; border: none; cursor: pointer;
                  background: var(--accent); font-size: 2.2rem; transition: transform .15s, box-shadow .3s; }
    #record-btn:active { transform: scale(.94); }
    #record-btn.recording { animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(224,36,94,.5); }
                       50% { box-shadow: 0 0 0 18px rgba(224,36,94,0); } }
    #status { margin-top: 0.9rem; color: var(--dim); font-size: 0.85rem; min-height: 1.2em; }
    #mic-select { margin-top: 0.5rem; max-width: 90%; background: var(--card); color: var(--dim);
                  border: 1px solid var(--line); border-radius: 0.5rem; padding: 0.3rem 0.5rem; font-size: 0.8rem; }

    #voices { margin-top: 1.6rem; display: none; flex-wrap: wrap; gap: 0.55rem; justify-content: center; }
    #voices.visible { display: flex; }
    .voice { padding: 0.7rem 1rem; border: 1px solid var(--line); border-radius: 0.7rem; cursor: pointer;
             background: var(--card); color: var(--text); font-size: 0.95rem; transition: border-color .15s; }
    .voice:hover { border-color: var(--accent); }
    .voice.busy { opacity: 0.6; pointer-events: none; }
    .voice.active { border-color: var(--accent); }

    #result { margin-top: 1.6rem; display: none; }
    #result.visible { display: block; }
    #player { width: 100%; margin-bottom: 0.8rem; }
    .row { display: flex; gap: 0.6rem; justify-content: center; }
    .btn { padding: 0.6rem 1.2rem; border-radius: 0.7rem; border: 1px solid var(--line);
           background: var(--card); color: var(--text); cursor: pointer; font-size: 0.9rem; }
    .btn.primary { background: var(--accent); border-color: var(--accent); }

    #toast { position: fixed; bottom: 1.4rem; left: 50%; transform: translateX(-50%);
             background: var(--card); border: 1px solid var(--line); border-radius: 0.7rem;
             padding: 0.7rem 1.1rem; font-size: 0.9rem; opacity: 0; transition: opacity .25s; pointer-events: none; }
    #toast.visible { opacity: 1; }
  </style>
</head>
<body>
  <main>
    <h1>VOICEMIX <span style="opacity:.45;">dev console</span></h1>
    <button id="record-btn" title="record">🎙️</button>
    <div id="status">tap to record (max 1:00)</div>
    <select id="mic-select" title="microphone"><option value="">default microphone</option></select>
    <div id="voices"></div>
    <section id="result">
      <audio id="player" controls></audio>
      <div class="row">
        <button id="share-btn" class="btn primary">Share</button>
        <button id="again-btn" class="btn">Record again</button>
      </div>
    </section>
    <div id="toast"></div>
  </main>
  <script src="/static/recorder.js"></script>
</body>
</html>
