name: Deploy Frontend

# PIPE 2 — frontend/SPA deploy.
# Build the image in CI -> push to GHCR -> box pulls + restarts (no build on box).
# Independent of the backend pipeline (separate image, separate concurrency group).

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'deploy/docker-compose.yml'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

# One deploy at a time — never let overlapping main pushes race the box.
concurrency:
  group: deploy-frontend
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/aaronw122/voicemix-frontend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Plain `docker build` uses the daemon's built-in BuildKit, so it never pulls
      # a separate buildx/buildkit image from Docker Hub (that pull is what timed
      # out and flaked the first run). The retry loop also absorbs transient Docker
      # Hub timeouts when pulling base images. VITE_API_BASE_URL is inlined at build.
      - name: Build and push (retried)
        run: |
          build_and_push_frontend() {
            docker build \
              --build-arg VITE_API_BASE_URL=https://voiceapi.awill.co \
              -t "$IMAGE:latest" -t "$IMAGE:sha-${{ github.sha }}" \
              ./frontend &&
            docker push "$IMAGE:latest" &&
            docker push "$IMAGE:sha-${{ github.sha }}"
          }
          for attempt in 1 2 3; do
            if build_and_push_frontend; then echo "build+push succeeded (attempt $attempt)"; exit 0; fi
            echo "::warning::build+push attempt $attempt failed; retrying in 15s"
            sleep 15
          done
          echo "::error::build+push failed after 3 attempts"; exit 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Stack-level lock: shared with the backend pipeline's deploy job so only one
    # deploy mutates ~/voicemix on the box at a time. Builds stay parallel.
    concurrency:
      group: voicemix-box-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Copy deploy files to box
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "deploy/docker-compose.yml,deploy/.env.example"
          target: "~/voicemix"
          strip_components: 1

      - name: Pull and restart on box
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd ~/voicemix
            # Deploy the exact image this commit built (pinned, not mutable :latest).
            # Persist the tag into the box .env so a manual `docker compose up` after a
            # reboot uses this SHA instead of drifting back to :latest. Rollback = edit
            # this line. (.env is the box-local file; CI only ships .env.example.)
            frontend_image_tag="sha-${{ github.sha }}"
            if grep -q '^FRONTEND_IMAGE_TAG=' .env 2>/dev/null; then
              sed -i "s|^FRONTEND_IMAGE_TAG=.*|FRONTEND_IMAGE_TAG=${frontend_image_tag}|" .env
            else
              echo "FRONTEND_IMAGE_TAG=${frontend_image_tag}" >> .env
            fi
            export FRONTEND_IMAGE_TAG="${frontend_image_tag}"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            # Scope to frontend only — never touch backend or cloudflared.
            docker compose pull frontend
            docker compose up -d --no-deps frontend
            # Post-deploy health gate: fail the deploy if nginx isn't serving the SPA.
            # Probe 127.0.0.1 (not localhost): curl may resolve localhost to ::1,
            # but nginx listens on IPv4 :80, so a localhost probe false-fails.
            frontend_ready=""
            for attempt in $(seq 1 15); do
              if docker compose exec -T frontend curl -fsS http://127.0.0.1/ >/dev/null 2>&1; then frontend_ready="yes"; break; fi
              sleep 2
            done
            if [ -z "$frontend_ready" ]; then
              echo "::error::frontend did not serve after deploy"
              docker compose ps
              docker compose logs --tail=50 frontend
              exit 1
            fi
            echo "frontend OK — serving the SPA"
            docker image prune -f
