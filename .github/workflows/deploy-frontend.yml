name: Deploy Frontend

# PIPE 2 — frontend/SPA deploy.
# Build the image in CI -> push to GHCR -> box pulls + restarts (no build on box).
# Independent of the backend pipeline (separate image, separate concurrency group).

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'deploy/docker-compose.yml'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

# One deploy at a time — never let overlapping main pushes race the box.
concurrency:
  group: deploy-frontend
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/aaronw122/voicemix-frontend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          # The API base URL is baked into the bundle at build time (Vite inlines VITE_*).
          build-args: |
            VITE_API_BASE_URL=https://voiceapi.awill.co
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy deploy files to box
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "deploy/docker-compose.yml,deploy/.env.example"
          target: "~/voicemix"
          strip_components: 1

      - name: Pull and restart on box
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd ~/voicemix
            # Deploy the exact image this commit built (pinned, not mutable :latest) — enables rollback.
            export FRONTEND_IMAGE_TAG="sha-${{ github.sha }}"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            # Scope to frontend only — never touch backend or cloudflared.
            docker compose pull frontend
            docker compose up -d --no-deps frontend
            # Post-deploy health gate: fail the deploy if nginx isn't serving the SPA.
            ok=""
            for i in $(seq 1 15); do
              if docker compose exec -T frontend wget -qO- http://localhost/ >/dev/null 2>&1; then ok="yes"; break; fi
              sleep 2
            done
            if [ -z "$ok" ]; then
              echo "::error::frontend did not serve after deploy"
              docker compose ps
              docker compose logs --tail=50 frontend
              exit 1
            fi
            echo "frontend OK — serving the SPA"
            docker image prune -f
