name: Deploy Backend

# PIPE 1 — backend/server deploy.
# Build the image in CI -> push to GHCR -> box pulls + restarts (no build on box).
# Frontend has its own pipeline.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'deploy/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

# One deploy at a time — never let overlapping main pushes race the box.
concurrency:
  group: deploy-backend
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/aaronw122/voicemix-backend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Plain `docker build` uses the daemon's built-in BuildKit, so it never pulls
      # a separate buildx/buildkit image from Docker Hub (that pull is what timed
      # out and flaked the run). The retry loop also absorbs transient Docker Hub
      # timeouts when pulling the base image.
      - name: Build and push (retried)
        run: |
          build_and_push_backend() {
            docker build -t "$IMAGE:latest" -t "$IMAGE:sha-${{ github.sha }}" ./backend &&
            docker push "$IMAGE:latest" &&
            docker push "$IMAGE:sha-${{ github.sha }}"
          }
          for attempt in 1 2 3; do
            if build_and_push_backend; then echo "build+push succeeded (attempt $attempt)"; exit 0; fi
            echo "::warning::build+push attempt $attempt failed; retrying in 15s"
            sleep 15
          done
          echo "::error::build+push failed after 3 attempts"; exit 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Stack-level lock: only one deploy job — across BOTH the backend and frontend
    # pipelines — may mutate ~/voicemix on the box at a time. Prevents two jobs
    # racing to scp the same compose file / run docker concurrently. Builds stay
    # parallel (this group is on the deploy job only).
    concurrency:
      group: voicemix-box-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Copy deploy files to box
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "deploy/docker-compose.yml,deploy/.env.example"
          target: "~/voicemix"
          strip_components: 1

      - name: Pull and restart on box
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd ~/voicemix
            # Deploy the exact image this commit built (pinned, not mutable :latest).
            # Persist the tag into the box .env so a manual `docker compose up` after a
            # reboot uses this SHA instead of drifting back to :latest. Rollback = edit
            # this line. (.env is the box-local file; CI only ships .env.example.)
            backend_image_tag="sha-${{ github.sha }}"
            if grep -q '^BACKEND_IMAGE_TAG=' .env 2>/dev/null; then
              sed -i "s|^BACKEND_IMAGE_TAG=.*|BACKEND_IMAGE_TAG=${backend_image_tag}|" .env
            else
              echo "BACKEND_IMAGE_TAG=${backend_image_tag}" >> .env
            fi
            export BACKEND_IMAGE_TAG="${backend_image_tag}"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            # Scope to backend only — never touch cloudflared (edge infra, brought up
            # once at bootstrap) or a future frontend container. --no-deps keeps this
            # deploy from reconciling other services in the compose file.
            docker compose pull backend
            docker compose up -d --no-deps backend
            # Post-deploy health gate: fail the deploy if the backend doesn't come up healthy.
            backend_ready=""
            for attempt in $(seq 1 15); do
              if curl -fsS http://127.0.0.1:8000/health >/dev/null 2>&1; then backend_ready="yes"; break; fi
              sleep 2
            done
            if [ -z "$backend_ready" ]; then
              echo "::error::backend /health did not pass after deploy"
              docker compose ps
              docker compose logs --tail=50 backend
              exit 1
            fi
            echo "health OK — backend is serving"
            docker image prune -f
