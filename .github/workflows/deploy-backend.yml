name: Deploy Backend

# PIPE 1 — backend/server deploy.
# Build the image in CI -> push to GHCR -> box pulls + restarts (no build on box).
# Frontend has its own pipeline.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'deploy/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

# One deploy at a time — never let overlapping main pushes race the box.
concurrency:
  group: deploy-backend
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/aaronw122/voicemix-backend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy deploy files to box
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "deploy/docker-compose.yml,deploy/Caddyfile,deploy/.env.example"
          target: "~/voicemix"
          strip_components: 1

      - name: Pull and restart on box
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd ~/voicemix
            # Deploy the exact image this commit built (pinned, not mutable :latest) — enables rollback.
            export BACKEND_IMAGE_TAG="sha-${{ github.sha }}"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker compose pull
            docker compose up -d
            # Post-deploy health gate: fail the deploy if the backend doesn't come up healthy.
            ok=""
            for i in $(seq 1 15); do
              if curl -fsS http://127.0.0.1:8000/health >/dev/null 2>&1; then ok="yes"; break; fi
              sleep 2
            done
            if [ -z "$ok" ]; then
              echo "::error::backend /health did not pass after deploy"
              docker compose ps
              docker compose logs --tail=50 backend
              exit 1
            fi
            echo "health OK — backend is serving"
            docker image prune -f
